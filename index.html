<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#E8734F">
<meta name="description" content="أذكار الصباح والمساء">
<title>أذكاري</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Morning palette */
    --dawn-sky-1:#FFE9CC;
    --dawn-sky-2:#F7B980;
    --dawn-sky-3:#E8734F;
    --dawn-ink:#5A2E1F;
    --dawn-card:#FFF8EE;
    --dawn-accent:#C4522E;
    --dawn-badge:#F2A65A;

    /* Evening palette */
    --night-sky-1:#0E1730;
    --night-sky-2:#1B2A4A;
    --night-sky-3:#2E3D63;
    --night-ink:#EDE7F6;
    --night-card:#182544;
    --night-accent:#F4C95D;
    --night-badge:#5B4B8A;

    --transition-speed: .7s;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    font-family:'Tajawal', sans-serif;
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    background: linear-gradient(180deg, var(--dawn-sky-1), var(--dawn-sky-2) 45%, var(--dawn-sky-3));
    color: var(--dawn-ink);
    transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
    position:relative;
  }

  body.night{
    background: linear-gradient(180deg, var(--night-sky-1), var(--night-sky-2) 55%, var(--night-sky-3));
    color: var(--night-ink);
  }

  /* stars layer */
  #stars{
    position:fixed; inset:0; pointer-events:none;
    opacity:0; transition: opacity var(--transition-speed) ease;
    z-index:0;
  }
  body.night #stars{ opacity:1; }
  .star{
    position:absolute; background:#fff; border-radius:50%;
    animation: twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.25; }
    50%{ opacity:1; }
  }

  .wrap{
    position:relative; z-index:1;
    max-width:560px; margin:0 auto;
    padding: 28px 18px 60px;
  }

  header{
    text-align:center;
    margin-bottom:22px;
  }

  .brand{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:2.4rem;
    letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }

  .brand svg{ width:34px; height:34px; flex-shrink:0; }

  .tagline{
    font-size:.85rem;
    opacity:.75;
    margin-top:6px;
    font-weight:500;
  }

  /* Toggle switch */
  .switcher{
    margin: 26px auto 8px;
    width: 240px;
    height: 54px;
    background: rgba(255,255,255,.25);
    border: 1px solid rgba(255,255,255,.4);
    border-radius: 999px;
    position: relative;
    display:flex;
    backdrop-filter: blur(4px);
    transition: background var(--transition-speed) ease;
  }
  body.night .switcher{
    background: rgba(255,255,255,.06);
    border-color: rgba(255,255,255,.15);
  }

  .switcher-thumb{
    position:absolute;
    top:4px; right:4px;
    width: calc(50% - 4px);
    height: 46px;
    border-radius:999px;
    background: var(--dawn-card);
    box-shadow: 0 3px 10px rgba(0,0,0,.15);
    transition: transform var(--transition-speed) cubic-bezier(.65,.05,.36,1), background var(--transition-speed) ease;
    z-index:0;
  }
  body.night .switcher-thumb{
    background: var(--night-card);
    transform: translateX(-100%);
  }

  .switcher button{
    flex:1;
    z-index:1;
    background:none; border:none;
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:1rem;
    color:inherit;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    height:100%;
  }
  .switcher button svg{ width:18px; height:18px; }

  main{ margin-top: 30px; }

  .section-title{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:1.5rem;
    text-align:center;
    margin-bottom: 22px;
    opacity:.9;
  }

  .card{
    background: var(--dawn-card);
    border-radius: 18px;
    padding: 22px 20px 18px;
    margin-bottom: 18px;
    box-shadow: 0 6px 18px rgba(90,46,31,.08);
    position:relative;
    transition: background var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
    border-top: 3px solid var(--dawn-badge);
  }
  body.night .card{
    background: var(--night-card);
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
    border-top-color: var(--night-badge);
  }

  .dhikr-text{
    font-family:'Amiri', serif;
    font-size: 1.28rem;
    line-height: 2.2;
    text-align: right;
    font-weight: 400;
  }

  .card-footer{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed rgba(0,0,0,.1);
  }
  body.night .card-footer{
    border-top-color: rgba(255,255,255,.12);
  }

  .source{
    font-size:.75rem;
    opacity:.65;
    font-weight:500;
  }

  .count-badge{
    background: var(--dawn-badge);
    color: var(--dawn-card);
    font-weight:800;
    font-size:.85rem;
    padding: 4px 14px;
    border-radius: 999px;
    white-space:nowrap;
  }
  body.night .count-badge{
    background: var(--night-badge);
    color: var(--night-ink);
  }

  footer{
    text-align:center;
    margin-top: 30px;
    font-size:.8rem;
    opacity:.6;
  }

  @media (prefers-reduced-motion: reduce){
    .star{ animation: none; opacity:.6; }
    .switcher-thumb{ transition: none; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <svg id="brandIcon" viewBox="0 0 24 24" fill="none"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="4.2" fill="currentColor"/></svg>
      <span>أذكاري</span>
    </div>
    <div class="tagline">حصنك من أول الصباح لآخر المساء</div>
  </header>

  <div class="switcher" id="switcher">
    <div class="switcher-thumb"></div>
    <button data-mode="morning">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="currentColor"/><path d="M12 2v2.2M12 19.8V22M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2 12h2.2M19.8 12H22M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      الصباح
    </button>
    <button data-mode="evening">
      <svg viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" fill="currentColor"/></svg>
      المساء
    </button>
  </div>

  <main>
    <div class="section-title" id="sectionTitle">أذكار الصباح</div>
    <div id="azkarList"></div>
  </main>

  <footer>اللهم بلغنا رمضان وأعنا على ذكرك وشكرك وحسن عبادتك</footer>
</div>

<script>
const morningAzkar = [
  {
    text: `أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ.`,

    text: `اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ.`,
    count: "١", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.`,
    count: "١ (سيد الاستغفار)", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلاَئِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لاَ إِلَهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ.`,
    count: "٤", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ، عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.`,
    count: "٧", source: "حصن المسلم"
  },
  {
    text: `بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.`,
    count: "١", source: "حصن المسلم"
  },
  {
    text: `سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.`,
    count: "١٠٠", source: "حصن المسلم"
  },
  {
    text: `أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ.`,
    count: "١٠٠", source: "حصن المسلم"
  },
  {
    text: `لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ.`,
    count: "١٠", source: "حصن المسلم"
  },
];

const eveningAzkar = [
  {
    text: `أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيْرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا.`,
    count: "١", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ.`,
    count: "١", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.`,
    count: "١ (سيد الاستغفار)", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلاَئِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لاَ إِلَهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ.`,
    count: "٤", source: "حصن المسلم"
  },
  {
    text: `اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ، عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.`,
    count: "٧", source: "حصن المسلم"
  },
  {
    text: `بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.`,
    count: "٣", source: "حصن المسلم"
  },
  {
    text: `يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.`,
    count: "١", source: "حصن المسلم"
  },
  {
    text: `سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.`,
    count: "١٠٠", source: "حصن المسلم"
  },
  {
    text: `لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ.`,
    count: "١٠", source: "حصن المسلم"
  },
];

const body = document.body;
const listEl = document.getElementById('azkarList');
const titleEl = document.getElementById('sectionTitle');
const switcher = document.getElementById('switcher');

function render(mode){
  const data = mode === 'evening' ? eveningAzkar : morningAzkar;
  titleEl.textContent = mode === 'evening' ? 'أذكار المساء' : 'أذكار الصباح';
  listEl.innerHTML = '';
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="dhikr-text">${item.text}</div>
      <div class="card-footer">
        <span class="source">${item.source}</span>
        <span class="count-badge">${item.count}</span>
      </div>
    `;
    listEl.appendChild(card);
  });
  body.classList.toggle('night', mode === 'evening');
}

switcher.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  render(btn.dataset.mode);
});

// Generate stars
const starsContainer = document.getElementById('stars');
for(let i=0; i<45; i++){
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random()*2 + 1;
  s.style.width = size+'px';
  s.style.height = size+'px';
  s.style.top = Math.random()*100+'%';
  s.style.left = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*3.5)+'s';
  starsContainer.appendChild(s);
}

render('morning');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
