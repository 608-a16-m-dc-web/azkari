<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#E8734F">
<meta name="description" content="أذكار الصباح والمساء">
<title>أذكاري</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --dawn-sky-1:#FFE9CC; --dawn-sky-2:#F7B980; --dawn-sky-3:#E8734F;
    --dawn-ink:#5A2E1F; --dawn-card:#FFF8EE; --dawn-accent:#C4522E; --dawn-badge:#F2A65A;

    --night-sky-1:#0E1730; --night-sky-2:#1B2A4A; --night-sky-3:#2E3D63;
    --night-ink:#EDE7F6; --night-card:#182544; --night-accent:#F4C95D; --night-badge:#5B4B8A;

    --transition-speed: .7s;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; font-family:'Tajawal', sans-serif; overflow-x:hidden; }

  body{
    min-height:100vh;
    background: linear-gradient(180deg, var(--dawn-sky-1), var(--dawn-sky-2) 45%, var(--dawn-sky-3));
    color: var(--dawn-ink);
    transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
    position:relative;
  }
  body.night{
    background: linear-gradient(180deg, var(--night-sky-1), var(--night-sky-2) 55%, var(--night-sky-3));
    color: var(--night-ink);
  }

  #stars{ position:fixed; inset:0; pointer-events:none; opacity:0; transition: opacity var(--transition-speed) ease; z-index:0; }
  body.night #stars{ opacity:1; }
  .star{ position:absolute; background:#fff; border-radius:50%; animation: twinkle 3.5s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:.25; } 50%{ opacity:1; } }

  #splash{
    position:fixed; inset:0; z-index:999;
    background: linear-gradient(160deg, #2E3D63, #1B2A4A 55%, #0E1730);
    display:flex; align-items:center; justify-content:center;
    padding: 32px;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #splash.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .splash-box{ max-width: 440px; text-align:center; color:#EDE7F6; }
  .splash-icon{ width:64px; height:64px; margin-bottom:18px; }
  .splash-text{ font-family:'Amiri', serif; font-size:1.35rem; line-height:2.1; font-weight:700; }
  .splash-sign{ margin-top: 22px; font-family:'Amiri', serif; font-style: italic; font-size: 1.05rem; color: var(--night-accent); }
  .splash-btn{
    margin-top: 34px; background: var(--night-accent); color:#1B2A4A; border:none;
    font-family:'Tajawal', sans-serif; font-weight:800; font-size:1rem; padding: 13px 34px;
    border-radius: 999px; cursor:pointer; box-shadow: 0 8px 20px rgba(0,0,0,.35);
  }

  .wrap{ position:relative; z-index:1; max-width:560px; margin:0 auto; padding: 28px 18px 60px; }

  header{ text-align:center; margin-bottom:22px; }
  .brand{ font-family:'Amiri', serif; font-weight:700; font-size:2.4rem; letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .brand svg{ width:34px; height:34px; flex-shrink:0; }
  .tagline{ font-size:.85rem; opacity:.75; margin-top:6px; font-weight:500; }

  .switcher{
    margin: 26px auto 8px; width: 240px; height: 54px;
    background: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.4);
    border-radius: 999px; position: relative; display:flex; backdrop-filter: blur(4px);
    transition: background var(--transition-speed) ease;
  }
  body.night .switcher{ background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.15); }

  .switcher-thumb{
    position:absolute; top:4px; right:4px; width: calc(50% - 4px); height: 46px;
    border-radius:999px; background: var(--dawn-card); box-shadow: 0 3px 10px rgba(0,0,0,.15);
    transition: transform var(--transition-speed) cubic-bezier(.65,.05,.36,1), background var(--transition-speed) ease;
    z-index:0;
  }
  body.night .switcher-thumb{ background: var(--night-card); transform: translateX(-100%); }

  .switcher button{
    flex:1; z-index:1; background:none; border:none; font-family:'Tajawal', sans-serif;
    font-weight:700; font-size:1rem; color:inherit; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px; height:100%;
  }
  .switcher button svg{ width:18px; height:18px; }

  main{ margin-top: 30px; }

  .section-head{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom: 22px; position:relative; }
  .section-title{ font-family:'Amiri', serif; font-weight:700; font-size:1.5rem; opacity:.9; }

  .reset-btn{
    position:absolute; left:0;
    background: rgba(255,255,255,.25); border:1px solid rgba(255,255,255,.4);
    color:inherit; font-family:'Tajawal', sans-serif; font-size:.75rem; font-weight:700;
    padding:7px 12px; border-radius:999px; cursor:pointer; display:flex; align-items:center; gap:5px;
  }
  body.night .reset-btn{ background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.18); }
  .reset-btn svg{ width:13px; height:13px; }

  .empty-msg{ text-align:center; padding: 50px 20px; opacity:.75; font-family:'Amiri', serif; font-size:1.15rem; line-height:1.9; }

  .card{
    background: var(--dawn-card); border-radius: 18px; padding: 22px 20px 18px; margin-bottom: 18px;
    box-shadow: 0 6px 18px rgba(90,46,31,.08); position:relative;
    transition: background var(--transition-speed) ease, box-shadow var(--transition-speed) ease,
                opacity .5s ease, transform .5s ease, max-height .5s ease, padding .5s ease, margin .5s ease;
    border-top: 3px solid var(--dawn-badge);
    max-height: 800px; overflow:hidden;
  }
  body.night .card{ background: var(--night-card); box-shadow: 0 6px 20px rgba(0,0,0,.35); border-top-color: var(--night-badge); }
  .card.done{ opacity:0; transform: scale(.92); max-height:0; padding-top:0; padding-bottom:0; margin-bottom:0; border-width:0; }

  .dhikr-text{ font-family:'Amiri', serif; font-size: 1.28rem; line-height: 2.2; text-align: right; font-weight: 400; }

  .card-footer{
    display:flex; justify-content: space-between; align-items:center; margin-top: 16px; padding-top: 12px;
    border-top: 1px dashed rgba(0,0,0,.1);
  }
  body.night .card-footer{ border-top-color: rgba(255,255,255,.12); }

  .source{ font-size:.75rem; opacity:.65; font-weight:500; }

  .count-btn{
    background: var(--dawn-badge); color: var(--dawn-card); font-weight:800; font-size:.95rem;
    padding: 8px 18px; border-radius: 999px; white-space:nowrap; border:none; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition: transform .15s ease, background .3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .count-btn:active{ transform: scale(.92); }
  body.night .count-btn{ background: var(--night-badge); color: var(--night-ink); }
  .count-btn .hint{ font-size:.68rem; font-weight:600; opacity:.85; }

  footer{ text-align:center; margin-top: 30px; font-size:.8rem; opacity:.6; }

  @media (prefers-reduced-motion: reduce){
    .star{ animation: none; opacity:.6; }
    .switcher-thumb{ transition: none; }
    .card{ transition: opacity .2s ease; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-box">
    <svg class="splash-icon" viewBox="0 0 24 24" fill="none"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4" stroke="#F4C95D" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="4" fill="#F4C95D"/></svg>
    <div class="splash-text">صَدَقَةٌ جَارِيَةٌ عَنِّي وَعَنْ أَرْوَاحِ الْمُسْلِمِينَ جَمِيعًا، الْأَحْيَاءِ مِنْهُمْ وَالْأَمْوَاتِ</div>
    <div class="splash-sign">— حسام حمدي</div>
    <button class="splash-btn" id="splashBtn">ابدأ بذكر الله</button>
  </div>
</div>

<div id="stars"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <svg id="brandIcon" viewBox="0 0 24 24" fill="none"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="4.2" fill="currentColor"/></svg>
      <span>أذكاري</span>
    </div>
    <div class="tagline">حصنك من أول الصباح لآخر المساء</div>
  </header>

  <div class="switcher" id="switcher">
    <div class="switcher-thumb"></div>
    <button data-mode="morning">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="currentColor"/><path d="M12 2v2.2M12 19.8V22M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2 12h2.2M19.8 12H22M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      الصباح
    </button>
    <button data-mode="evening">
      <svg viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" fill="currentColor"/></svg>
      المساء
    </button>
  </div>

  <main>
    <div class="section-head">
      <button class="reset-btn" id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        إعادة الكل
      </button>
      <div class="section-title" id="sectionTitle">أذكار الصباح</div>
    </div>
    <div id="azkarList"></div>
  </main>

  <footer>اللهم بلغنا رمضان وأعنا على ذكرك وشكرك وحسن عبادتك</footer>
</div>

<script>
const morningAzkarSource = [
  { text:`اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ، لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ، لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ، مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ، يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ، وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ، وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ، وَلَا يَئُودُهُ حِفْظُهُمَا، وَهُوَ الْعَلِيُّ الْعَظِيمُ.`, count:1, source:"آية الكرسي" },
  { text:`قُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ.`, count:3, source:"سورة الإخلاص" },
  { text:`قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِنْ شَرِّ مَا خَلَقَ، وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ، وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ.`, count:3, source:"سورة الفلق" },
  { text:`قُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ، إِلَٰهِ النَّاسِ، مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ، الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ، مِنَ الْجِنَّةِ وَالنَّاسِ.`, count:3, source:"سورة الناس" },
  { text:`أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ.`, count:1, source:"حصن المسلم" },
  { text:`اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ.`, count:1, source:"حصن المسلم" },
  { text:`اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنُوبَ إِلاَّ أَنْتَ.`, count:1, source:"سيد الاستغفار" },
  { text:`اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلاَئِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لاَ إِلَهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ، وَأَنَّ مُحَمَّدًا عَبْدُكَ وَرَسُولُكَ.`, count:4, source:"حصن المسلم" },
  { text:`اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ، فَمِنْكَ وَحْدَكَ لاَ شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ.`, count:1, source:"حصن المسلم" },
  { text:`اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ.`, count:3, source:"حصن المسلم" },
  { text:`حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ، عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.`, count:7, source:"حصن المسلم" },
  { text:`بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.`, count:3, source:"حصن المسلم" },
  { text:`رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.`, count:3, source:"حصن المسلم" },
  { text:`يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.`, count:1, source:"حصن المسلم" },
  { text:`أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ.`, count:1, source:"حصن المسلم" },
  { text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.`, count:100, source:"حصن المسلم" },
  { text:`لاَ إِلَهَ إِلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، يُحْيِي وَيُمِيتُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.`, count:10, source:"حصن المسلم" },
  { text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.`, count:3, source:"حصن المسلم" },
  { text:`أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ.`, count:100, source:"حصن المسلم" },
  { text:`لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ.`, count:10, source:"حصن المسلم" },
  { text:`اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ.`, count:10, source:"حصن المسلم" },

  { text:`اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ.`, count:3, source:"حصن المسلم" },
  { text:`أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.`, count:3, source:"حصن المسلم" },
  { text:`حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ، عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.`, count:7, source:"حصن المسلم" },
  { text:`بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.`, count:3, source:"حصن المسلم" },
  { text:`رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.`, count:3, source:"حصن المسلم" },
  { text:`يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ، أَصْلِحْ لِي شَأْنِي كُلَّهُ، وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ.`, count:1, source:"حصن المسلم" },

  { text:`سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.`, count:100, source:"حصن المسلم" },

  { text:`أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ.`, count:100, source:"حصن المسلم" },
  { text:`لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللَّهِ.`, count:10, source:"حصن المسلم" },
  { text:`اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ.`, count:10, source:"حصن المسلم" },

let currentMode = 'morning';
let state = { morning: null, evening: null };

function freshState(mode){
  const src = mode === 'evening' ? eveningAzkarSource : morningAzkarSource;
  return src.map((item, i) => ({ ...item, id: mode+'-'+i, remaining: item.count }));
}

state.morning = freshState('morning');
state.evening = freshState('evening');

const body = document.body;
const listEl = document.getElementById('azkarList');
const titleEl = document.getElementById('sectionTitle');
const switcher = document.getElementById('switcher');
const resetBtn = document.getElementById('resetBtn');

function toArabicNumber(n){
  const map = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(n).split('').map(d => map[+d] ?? d).join('');
}

function render(mode){
  currentMode = mode;
  titleEl.textContent = mode === 'evening' ? 'أذكار المساء' : 'أذكار الصباح';
  const data = state[mode];
  listEl.innerHTML = '';

  const remainingItems = data.filter(item => item.remaining > 0);

  if(remainingItems.length === 0){
    const doneMsg = document.createElement('div');
    doneMsg.className = 'empty-msg';
    doneMsg.textContent = 'تقبّل الله منك، أتممت كل الأذكار. اضغط "إعادة الكل" لو حابب تبدأ من جديد.';
    listEl.appendChild(doneMsg);
  }

  data.forEach(item => {
    if(item.remaining <= 0) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;
    card.innerHTML = `
      <div class="dhikr-text">${item.text}</div>
      <div class="card-footer">
        <span class="source">${item.source}</span>
        <button class="count-btn" data-id="${item.id}">
          <span class="hint">اضغط بعد كل مرة</span>
          <span>${toArabicNumber(item.remaining)}</span>
        </button>
      </div>
    `;
    listEl.appendChild(card);
  });

  body.classList.toggle('night', mode === 'evening');
}

listEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.count-btn');
  if(!btn) return;
  const id = btn.dataset.id;
  const item = state[currentMode].find(x => x.id === id);
  if(!item) return;
  item.remaining = Math.max(0, item.remaining - 1);

  if(item.remaining === 0){
    const card = btn.closest('.card');
    card.classList.add('done');
    setTimeout(() => render(currentMode), 480);
  } else {
    btn.querySelector('span:last-child').textContent = toArabicNumber(item.remaining);
  }
});

switcher.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  render(btn.dataset.mode);
});

resetBtn.addEventListener('click', () => {
  state[currentMode] = freshState(currentMode);
  render(currentMode);
});

const splash = document.getElementById('splash');
const splashBtn = document.getElementById('splashBtn');
splashBtn.addEventListener('click', () => splash.classList.add('hidden'));

const starsContainer = document.getElementById('stars');
for(let i=0; i<45; i++){
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random()*2 + 1;
  s.style.width = size+'px';
  s.style.height = size+'px';
  s.style.top = Math.random()*100+'%';
  s.style.left = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*3.5)+'s';
  starsContainer.appendChild(s);
}

render('morning');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
